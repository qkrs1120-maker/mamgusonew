<script>
/* ======================================================
   오행 계산 유틸
====================================================== */
const HEAVENLY = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const EARTHLY   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const STEM_ELEM  = ['木','木','火','火','土','土','金','金','水','水'];
const BRANCH_ELEM= ['水','土','木','木','土','火','火','土','金','金','土','水'];
const ELEM_NAMES = { '木':'목(木)','火':'화(火)','土':'토(土)','金':'금(金)','水':'수(水)' };
const ELEM_COLORS= { '木':'#4ADE80','火':'#F87171','土':'#FBBF24','金':'#A78BFA','水':'#60A5FA' };

function getOhang(year, month, day) {
  const base = new Date(year, month - 1, day);
  const dayOfWeek = base.getDay(); // unused but left for future
  const stemIdx = year % 10;
  const branchIdx = year % 12;
  const monthStemIdx = (month + 2) % 10;
  const monthBranchIdx = (month + 1) % 12;
  const daySeed = Math.floor((year * 5 + month * 3 + day) % 10);
  const dayBranchSeed = Math.floor((year * 3 + month * 7 + day) % 12);

  const elems = [
    STEM_ELEM[stemIdx],
    BRANCH_ELEM[branchIdx],
    STEM_ELEM[monthStemIdx],
    BRANCH_ELEM[monthBranchIdx],
    STEM_ELEM[daySeed],
    BRANCH_ELEM[dayBranchSeed],
  ];

  const count = { '木':0, '火':0, '土':0, '金':0, '水':0 };
  elems.forEach(e => count[e]++);
  return count;
}

function ohangScore(count) {
  const total = Object.values(count).reduce((a,b) => a+b, 0);
  const pct = {};
  Object.entries(count).forEach(([k,v]) => pct[k] = Math.round(v / total * 100));
  return pct;
}

// 상생 관계: 木→火→土→金→水→木
// 상극 관계: 木→土, 土→水, 水→火, 火→金, 金→木
const GENERATE = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
const CONTROL  = { '木':'土','土':'水','水':'火','火':'金','金':'木' };

function calcRelationScore(ohang1, ohang2) {
  const dom1 = Object.entries(ohang1).sort((a,b) => b[1]-a[1])[0][0];
  const dom2 = Object.entries(ohang2).sort((a,b) => b[1]-a[1])[0][0];

  let score = 50;
  if (GENERATE[dom1] === dom2 || GENERATE[dom2] === dom1) score += 25;
  if (CONTROL[dom1] === dom2 || CONTROL[dom2] === dom1) score -= 20;
  if (dom1 === dom2) score += 10;

  // 보완성: 한쪽에 부족한 오행이 다른 쪽에 있으면 +
  Object.keys(ohang1).forEach(e => {
    if (ohang1[e] === 0 && ohang2[e] >= 2) score += 5;
    if (ohang2[e] === 0 && ohang1[e] >= 2) score += 5;
  });

  return Math.min(98, Math.max(28, score));
}

function selectRtype(btn) {
  const wrap = btn.closest('.relation-type-btns');
  wrap.querySelectorAll('.relation-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRtype = btn.dataset.rtype;
}

function loadSaved() {
  try {
    const info = JSON.parse(localStorage.getItem('maullab_user_info') || 'null');
    if (!info) return;
    if (document.getElementById('myName'))   document.getElementById('myName').value   = info.name || '';
    if (document.getElementById('myGender')) document.getElementById('myGender').value = info.gender || 'female';
    if (document.getElementById('myYear'))   document.getElementById('myYear').value   = info.year || '';
    if (document.getElementById('myMonth'))  document.getElementById('myMonth').value  = info.month || '';
    if (document.getElementById('myDay'))    document.getElementById('myDay').value    = info.day || '';
    if (info.name) {
      document.getElementById('savedNotice').style.display = 'flex';
      document.getElementById('savedName').textContent = info.name;
    }
  } catch(e) {}
}

              ${Object.entries(pct2).map(([e,p]) => `
                <div class="ohang-bar-row">
                  <div class="ohang-bar-label">${ELEM_NAMES[e].split('(')[0]}</div>
                  <div class="ohang-bar-track"><div class="ohang-bar-fill" style="width:${p}%;background:${ELEM_COLORS[e]};"></div></div>
                  <div class="ohang-bar-pct">${p}%</div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- 관계 해석 -->
      <div class="result-card">
        <h4>🔮 오행으로 보는 관계 해석</h4>
        <p>${advice}</p>
      </div>

      <!-- 광고 -->
      <div class="ad-slot">
        <ins class="adsbygoogle" style="display:block;width:100%;min-height:90px;" data-ad-client="ca-pub-2567294396988257" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>

      <!-- 잘 맞는 점 -->
      <div class="result-card">
        <h4>✅ 잘 맞는 점</h4>
        <p>✨ <span class="highlight">${profile.good[goodIdx]}</span></p>
        <div class="tag-list" style="margin-top:10px;">
          ${profile.good.map(g => `<span class="tag tag-good">${g}</span>`).join('')}
        </div>
      </div>

      <!-- 주의할 점 -->
      <div class="result-card">
        <h4>⚠️ 주의할 점</h4>
        <p>${profile.bad[badIdx]}</p>
        <div class="tag-list" style="margin-top:10px;">
          ${profile.bad.map(b => `<span class="tag tag-caution">${b}</span>`).join('')}
        </div>
      </div>

      <!-- 관계 개선 조언 -->
      <div class="result-card" style="background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(79,70,229,0.1));border-color:rgba(124,58,237,0.3);">
        <h4>💡 관계 개선 조언</h4>
        <p style="color:#E0D7FF;">${profile.tips[tipIdx]}</p>
        <p style="margin-top:10px;color:#E0D7FF;">${profile.tips[(tipIdx+1)%profile.tips.length]}</p>
      </div>

      <!-- 버튼 -->
      <button class="btn-share" onclick="doShare('${myN}와 ${thN}의 사주 관계 분석! 두 사람의 오행 궁합 점수는 ${score}점 🔮')">🔗 결과 공유하고 +10 크레딧 받기</button>
      <button class="btn-retry" onclick="resetForm()">🔄 다시 분석하기</button>
    `;

    const rs = document.getElementById('resultSection');
    rs.innerHTML = html;
    rs.style.display = 'block';
    rs.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // 게이지 애니메이션
    setTimeout(() => {
      const bar = document.getElementById('gaugeBar');
      if (bar) bar.style.width = score + '%';
    }, 100);

    // 광고 초기화
    try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  }, 2000);
}

function resetForm() {
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('formSection').style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ======================================================
   초기화
====================================================== */
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('relCreditCount');
  if (el) el.textContent = getCredits();
  loadSaved();

  // URL 파라미터로 탭 선택
  const params = new URLSearchParams(location.search);
  const type = params.get('type');
  if (type === 'family') switchTab('family');

  // 내 정보 변경 시 자동저장
  ['myName','myGender','myYear','myMonth','myDay'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', () => {
      const name = document.getElementById('myName').value;
      const year = document.getElementById('myYear').value;
      if (name && year) {
        localStorage.setItem('maullab_user_info', JSON.stringify({
          name, gender: document.getElementById('myGender').value,
          year, month: document.getElementById('myMonth').value,
          day: document.getElementById('myDay').value, hour: '99'
        }));
      }
    });
  });
});
</script>
</body>
</html>
