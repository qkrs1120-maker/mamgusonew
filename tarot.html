<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타로 카드 — 마음연구소</title>
  <meta name="description" content="라이더-웨이트 타로 카드를 직접 뽑아보세요. 오늘의 운세, 연애운, 짝사랑, 재회운을 타로로 확인하세요." />
  <link rel="stylesheet" href="style.css" />
  <script src="credits.js" defer></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-405F4WEG03"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date()); gtag('config', 'G-405F4WEG03');
  </script>
  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2567294396988257" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0518; min-height: 100vh; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }

    /* ── 배경 별빛 파티클 ── */
    .stars-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d, 3s) infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.1} 50%{opacity:0.8} }

    /* ── 헤더 ── */
    .tarot-header {
      position: relative; z-index: 10;
      background: rgba(10,5,24,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }
    .tarot-header-inner {
      max-width: 720px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .tarot-header-logo { display: flex; align-items: center; gap: 8px; color: white; text-decoration: none; }
    .tarot-header-logo span { font-size: 0.9rem; font-weight: 800; }
    .tarot-header-right { display: flex; align-items: center; gap: 10px; }
    .tarot-back-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7); border-radius: 8px; padding: 6px 12px;
      font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
    }
    .tarot-back-btn:hover { background: rgba(255,255,255,0.15); color: white; }

    /* ── 메인 래퍼 ── */
    .tarot-main {
      position: relative; z-index: 5;
      max-width: 720px; margin: 0 auto;
      padding: 32px 20px 120px;
    }

    /* ── 운세 타입 선택 ── */
    .type-section { margin-bottom: 32px; }
    .type-section-title {
      color: rgba(255,255,255,0.5); font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
    }
    .type-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .type-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 8px; border-radius: 14px; cursor: pointer; transition: all 0.22s;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6); font-size: 0.78rem; font-weight: 700;
      text-align: center; user-select: none;
    }
    .type-btn:hover { border-color: rgba(168,85,247,0.5); background: rgba(168,85,247,0.1); color: white; }
    .type-btn.active {
      border-color: #A855F7; background: linear-gradient(135deg,rgba(124,58,237,0.4),rgba(168,85,247,0.3));
      color: white; box-shadow: 0 4px 20px rgba(168,85,247,0.25);
    }
    .type-btn .tb-icon { font-size: 1.5rem; }

    /* ── 크레딧 안내 ── */
    .credit-notice {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,215,0,0.2);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      color: rgba(255,255,255,0.7); font-size: 0.82rem;
    }
    .credit-notice strong { color: #FCD34D; }

    /* ── 지시문 ── */
    .instruction {
      text-align: center; margin-bottom: 20px;
      color: rgba(255,255,255,0.5); font-size: 0.88rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* ── 카드 테이블 ── */
    .card-table {
      background: radial-gradient(ellipse at center, #1a0f3a 0%, #0a0518 70%);
      border-radius: 20px; padding: 28px 16px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
      margin-bottom: 28px;
      position: relative;
    }
    .card-table-label {
      text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.25);
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px;
    }

    .card-spread {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px;
    }

    /* ── 개별 카드 ── */
    .tc {
      width: 72px; height: 120px;
      perspective: 1000px; cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s;
    }
    .tc:not(.selected):not(.revealed):hover { transform: translateY(-8px) scale(1.06); }
    .tc.selected { transform: translateY(-12px) scale(1.1); }
    .tc.dimmed { opacity: 0.3; pointer-events: none; transform: none; }

    .tc-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
    }
    .tc.revealed .tc-inner { transform: rotateY(180deg); }

    .tc-back, .tc-front {
      position: absolute; inset: 0; border-radius: 9px;
      backface-visibility: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* 카드 뒷면 */
    .tc-back {
      background: linear-gradient(160deg,#2d0d6b,#4c1d95,#2d0d6b);
      border: 1.5px solid rgba(168,85,247,0.35);
      box-shadow: 0 3px 16px rgba(0,0,0,0.6);
    }
    .tc-back-inner {
      position: absolute; inset: 6px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
      background: repeating-linear-gradient(
        45deg, transparent, transparent 4px,
        rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 5px
      );
    }
    .tc-back-moon { font-size: 1.4rem; position: relative; z-index: 1; }
    .tc-back-star {
      position: absolute; font-size: 0.6rem; opacity: 0.5;
    }

    /* 카드 앞면 */
    .tc-front {
      transform: rotateY(180deg);
      padding: 6px 4px; gap: 3px;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .tc-front.rev { transform: rotateY(180deg) rotate(180deg); }
    .tc-front-num { font-size: 0.48rem; font-weight: 800; opacity: 0.7; color: white; }
    .tc-front-emoji { font-size: 1.7rem; line-height: 1; }
    .tc-front-name { font-size: 0.46rem; font-weight: 800; color: white; text-align: center; line-height: 1.25; }
    .tc-front-rev { font-size: 0.42rem; background: rgba(239,68,68,0.4); color: #FCA5A5; padding: 1px 5px; border-radius: 3px; }

    /* ── 결과 패널 ── */
    .result-panel {
      display: none;
      background: linear-gradient(160deg,#0d0820,#16093a);
      border-radius: 20px; padding: 28px 20px;
      border: 1px solid rgba(168,85,247,0.2);
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }
    .result-panel.show { display: block; animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

    /* 결과 카드 표시 */
    .result-card-row {
      display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px;
    }
    .result-card-img {
      width: 90px; height: 152px; flex-shrink: 0; border-radius: 11px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 5px; padding: 8px 5px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 6px 28px rgba(0,0,0,0.6);
    }
    .result-card-img .rci-num { font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.65); }
    .result-card-img .rci-emoji { font-size: 2.4rem; line-height: 1; }
    .result-card-img .rci-name { font-size: 0.55rem; font-weight: 800; color: white; text-align: center; line-height: 1.3; }
    .result-card-img .rci-rev {
      font-size: 0.5rem; background: rgba(239,68,68,0.3); color: #FCA5A5;
      padding: 2px 7px; border-radius: 4px;
    }

    .result-card-info { flex: 1; color: white; }
    .result-card-info h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 4px; }
    .result-card-info .rci-sub { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
    .result-keywords {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    .result-keywords span {
      padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
      background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.35); color: #C4B5FD;
    }

    /* 결과 읽기 섹션 */
    .reading-section { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }
    .reading-type-label {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.3);
      border-radius: 8px; padding: 5px 12px; font-size: 0.78rem; font-weight: 800;
      color: #C4B5FD; margin-bottom: 14px;
    }
    .reading-text {
      font-size: 0.92rem; line-height: 1.95; color: rgba(255,255,255,0.87);
    }
    .reading-text .hl { color: #F0ABFC; font-weight: 700; }
    .reading-text .hl2 { color: #FDE68A; font-weight: 700; }

    .reading-sections-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px;
    }
    .rs-box {
      background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .rs-box h4 { font-size: 0.75rem; font-weight: 800; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .rs-box p { font-size: 0.82rem; color: rgba(255,255,255,0.8); line-height: 1.7; }

    /* 광고 */
    .result-ad { margin: 22px 0; }

    /* 다시 뽑기 버튼 */
    .redraw-btn {
      display: block; width: 100%; margin-top: 22px;
      padding: 15px; border-radius: 13px;
      background: linear-gradient(135deg,#7C3AED,#A855F7);
      color: white; font-size: 0.95rem; font-weight: 800;
      border: none; cursor: pointer; transition: opacity 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .redraw-btn:hover { opacity: 0.88; }

    /* 공유 박스 */
    .share-box {
      margin-top: 16px; display: flex; gap: 10px;
    }
    .share-box button {
      flex: 1; padding: 12px 8px; border-radius: 11px; border: none;
      font-size: 0.82rem; font-weight: 800; cursor: pointer; transition: opacity 0.2s;
    }
    .share-box button:hover { opacity: 0.85; }
    .btn-share-link { background: #1F2937; color: white; }
    .btn-share-reward { background: linear-gradient(135deg,#F59E0B,#F97316); color: white; }

    /* 카드 사전 (하단) */
    .deck-section { margin-top: 40px; }
    .deck-title {
      color: rgba(255,255,255,0.4); font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px;
    }
    .deck-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    }
    .deck-card {
      cursor: pointer; transition: transform 0.15s;
      background: rgba(255,255,255,0.04); border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08); padding: 10px 6px;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .deck-card:hover { transform: translateY(-3px); border-color: rgba(168,85,247,0.4); }
    .deck-card .dc-emoji { font-size: 1.4rem; }
    .deck-card .dc-num { font-size: 0.54rem; color: rgba(168,85,247,0.8); font-weight: 700; }
    .deck-card .dc-name { font-size: 0.58rem; color: rgba(255,255,255,0.65); font-weight: 700; line-height: 1.2; }

    /* 카드 상세 모달 */
    .card-detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 2000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .card-detail-overlay.open { display: flex; }
    .card-detail-modal {
      background: linear-gradient(160deg,#0d0820,#1a0a3e);
      border-radius: 20px; padding: 28px 22px; max-width: 400px; width: 100%;
      color: white; border: 1px solid rgba(168,85,247,0.2);
      max-height: 88vh; overflow-y: auto;
      animation: cmPop 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cmPop { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:none} }
    .cdm-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .cdm-img {
      width: 64px; height: 106px; flex-shrink: 0; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 6px; border: 1.5px solid rgba(255,255,255,0.2);
    }
    .cdm-img .ci-emoji { font-size: 1.8rem; }
    .cdm-img .ci-name { font-size: 0.46rem; font-weight: 700; text-align: center; line-height: 1.2; color: white; }
    .cdm-info h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; }
    .cdm-info .ci-sub { font-size: 0.78rem; color: rgba(255,255,255,0.5); }
    .cdm-section { margin-top: 14px; }
    .cdm-section h4 { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .cdm-section p { font-size: 0.86rem; line-height: 1.8; color: rgba(255,255,255,0.85); }
    .cdm-kws { display: flex; flex-wrap: wrap; gap: 5px; }
    .cdm-kws span { padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.3); color: #C4B5FD; }
    .cdm-close { width: 100%; padding: 12px; margin-top: 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: white; font-size: 0.9rem; font-weight: 700; cursor: pointer; }

    /* 크레딧 모달은 style.css에서 가져옴 */

    /* 모바일 */
    @media (max-width: 600px) {
      .type-grid { grid-template-columns: repeat(3,1fr); gap: 7px; }
      .type-btn { padding: 12px 5px; font-size: 0.72rem; }
      .type-btn .tb-icon { font-size: 1.25rem; }
      .tc { width: 58px; height: 97px; }
      .tc-back-moon { font-size: 1.1rem; }
      .tc-front-emoji { font-size: 1.4rem; }
      .deck-grid { grid-template-columns: repeat(4,1fr); }
      .reading-sections-grid { grid-template-columns: 1fr; }
      .result-card-row { flex-direction: column; align-items: center; }
    }
    @media (max-width: 380px) {
      .tc { width: 50px; height: 84px; }
      .deck-grid { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>
<body>

<!-- 별빛 배경 -->
<div class="stars-bg" id="starsBg"></div>

<!-- 헤더 -->
<header class="tarot-header">
  <div class="tarot-header-inner">
    <a href="index.html" class="tarot-header-logo">
      <span>🧠</span>
      <span>마음연구소</span>
    </a>
    <div class="tarot-header-right">
      <div class="credit-badge-wrap" onclick="openCreditModal()" style="border-color:rgba(252,211,77,0.5);background:rgba(252,211,77,0.08);">
        <span class="credit-coin">🪙</span>
        <span class="credit-badge-count" style="color:#FCD34D;">100</span>
        <span class="credit-badge-label" style="color:rgba(252,211,77,0.7);">크레딧</span>
      </div>
      <button class="tarot-back-btn" onclick="location.href='tests.html?cat=astro'">← 목록</button>
    </div>
  </div>
</header>

<!-- 메인 -->
<main class="tarot-main">

  <!-- 타이틀 -->
  <div style="text-align:center;padding:10px 0 28px;color:white;">
    <div style="font-size:2.6rem;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(168,85,247,0.6));">🃏</div>
    <h1 style="font-size:1.6rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#C4B5FD,#F0ABFC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">웨이트 타로 카드</h1>
    <p style="font-size:0.88rem;color:rgba(255,255,255,0.5);line-height:1.7;">라이더-웨이트 메이저 아르카나 22장<br>마음속 질문에 대한 답을 찾아보세요</p>
  </div>

  <!-- 운세 타입 선택 -->
  <div class="type-section">
    <div class="type-section-title">어떤 운세를 볼까요?</div>
    <div class="type-grid">
      <button class="type-btn" data-type="today" onclick="selectType(this,'today')">
        <span class="tb-icon">☀️</span>오늘의 운세
      </button>
      <button class="type-btn" data-type="love" onclick="selectType(this,'love')">
        <span class="tb-icon">💕</span>연애운
      </button>
      <button class="type-btn" data-type="crush" onclick="selectType(this,'crush')">
        <span class="tb-icon">💘</span>짝사랑
      </button>
      <button class="type-btn" data-type="monthly" onclick="selectType(this,'monthly')">
        <span class="tb-icon">📅</span>이번 달
      </button>
      <button class="type-btn" data-type="reunion" onclick="selectType(this,'reunion')">
        <span class="tb-icon">🔄</span>재회운
      </button>
      <button class="type-btn" data-type="money" onclick="selectType(this,'money')">
        <span class="tb-icon">💰</span>재물운
      </button>
    </div>
  </div>

  <!-- 크레딧 안내 -->
  <div class="credit-notice">
    <div>🪙 타로 1회 = <strong>10 크레딧</strong> · 현재 <strong id="tarotCreditDisplay">-</strong>개 보유</div>
    <button onclick="openCreditModal()" style="background:rgba(252,211,77,0.15);border:1px solid rgba(252,211,77,0.3);color:#FCD34D;border-radius:8px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;">충전</button>
  </div>

  <!-- 지시문 -->
  <div class="instruction" id="instruction" style="display:none;">
    ✨ 카드를 한 장 선택하세요
  </div>

  <!-- 카드 테이블 -->
  <div class="card-table" id="cardTable" style="display:none;">
    <div class="card-table-label">✦ Major Arcana — 22장 ✦</div>
    <div class="card-spread" id="cardSpread"></div>
  </div>

  <!-- 결과 패널 -->
  <div class="result-panel" id="resultPanel">
    <div id="resultContent"></div>
    <div class="result-ad">
      <ins class="adsbygoogle" style="display:block;text-align:center;"
           data-ad-client="ca-pub-2567294396988257" data-ad-slot="auto"
           data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>
    <div class="share-box">
      <button class="btn-share-link" onclick="copyAndShare()">🔗 링크 복사</button>
      <button class="btn-share-reward" onclick="shareAndReward()">🎁 공유 +10크레딧</button>
    </div>
    <button class="redraw-btn" onclick="resetDraw()">🔮 다시 카드 뽑기</button>
  </div>

  <!-- 카드 사전 -->
  <div class="deck-section">
    <div class="deck-title">📖 메이저 아르카나 22장 — 카드를 눌러 의미 확인</div>
    <div class="deck-grid" id="deckGrid"></div>
  </div>

</main>

<!-- 카드 상세 모달 -->
<div class="card-detail-overlay" id="cardDetailOverlay" onclick="if(event.target===this)closeCardDetail()">
  <div class="card-detail-modal" id="cardDetailModal"></div>
</div>

<!-- 크레딧 모달 -->
<div class="credit-modal-overlay" id="creditModalOverlay" onclick="if(event.target===this)closeCreditModal()">
  <div class="credit-modal" id="creditModalBody"></div>

    },
  },
  {
    num:'XX', key:'judgement', name:'심판', en:'Judgement',
    emoji:'🔔', bg:'linear-gradient(135deg,#F0FDF4,#BBF7D0)',
    color:'#166534',
    keywords:['부름','깨달음','재생','새출발','용서'],
    uprightKw:['깨달음','부름','재생','용서','진실'],
    reversedKw:['자기의심','두려움','후회','판단 회피'],
    desc:'깨달음과 재생, 새로운 부름을 상징해요. 과거를 용서하고 새롭게 태어나는 에너지예요.',
    upright:'새로운 깨달음이 찾아오고 있어요. 과거를 용서하고 다시 시작할 준비가 됐어요.',
    reversed:'과거에 대한 후회나 자책에 갇혀 있어요. 스스로를 용서해야 해요.',
    readings:{

      reunion:'과거의 상처를 서로 용서하고 새롭게 시작할 준비가 됐을 때 재회가 의미 있어요.',
      money:'재물 관련 새로운 시작이나 기회가 찾아올 수 있어요.',
    },
  },
  {
    num:'XXI', key:'world', name:'세계', en:'The World',
    emoji:'🌍', bg:'linear-gradient(135deg,#F0FDFA,#99F6E4)',
    color:'#0F766E',
    keywords:['완성','성취','통합','여행','무한'],
    uprightKw:['완성','성취','성공','통합','여행'],
    reversedKw:['미완성','목표 부재','지연','폐쇄'],
    desc:'모든 여정의 완성과 성취를 상징하는 카드예요. 최고의 성공과 풍요로운 완성의 에너지예요.',
    upright:'목표를 달성하고 있어요! 완성과 성취의 에너지가 충만해요. 더 넓은 세계로 나아가세요.',
    reversed:'뭔가 미완성으로 느껴지거나 목표를 달성하지 못한 느낌이 있어요.',
    readings:{
      today:'오늘은 완성과 성취의 에너지가 넘치는 날이에요. 마무리하지 못한 일을 마무리하기에 좋아요.',
      love:'관계가 원숙하고 완성된 단계에 접어들고 있어요. 행복하고 충만한 사랑을 즐기세요.',
      crush:'긍정적인 결과가 기다리고 있어요. 자신감 있게 마음을 전해보세요.',
      monthly:'이번 달은 완성과 성취의 달이에요. 모든 노력이 좋은 결과로 이어질 거예요.',
      reunion:'두 사람의 인연이 완성되는 방향으로 흘러갈 가능성이 높아요.',
      money:'재물적 성공과 풍요로움의 에너지예요. 노력한 것들이 결실을 맺는 시기예요.',
    },
  },

// =====================================================
// 타입 라벨 매핑
// =====================================================
const TYPE_LABELS = {
  today:   { label:'오늘의 운세', icon:'☀️' },
  love:    { label:'연애운',     icon:'💕' },
  crush:   { label:'짝사랑 성공률', icon:'💘' },
  monthly: { label:'이번 달 운세', icon:'📅' },
  reunion: { label:'재회운',     icon:'🔄' },
  money:   { label:'재물운',     icon:'💰' },
};

// =====================================================
// 상태
// =====================================================
let currentType    = null;
let drawnCard      = null;
let isReversed     = false;
let spreadShuffled = [];

// =====================================================
// 초기화
// =====================================================
document.addEventListener('DOMContentLoaded', () => {
  // 별빛 생성
  const bg = document.getElementById('starsBg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    bg.appendChild(s);
  }

  // 크레딧 표시
  refreshAllCreditBadges();
  document.getElementById('tarotCreditDisplay').textContent = getCredits();

  // URL 파라미터로 타입 자동 선택
  const p = new URLSearchParams(location.search);
  const t = p.get('type');
  if (t && TYPE_LABELS[t]) {
    const btn = document.querySelector(`.type-btn[data-type="${t}"]`);
    if (btn) selectType(btn, t);
  }

  // 카드 사전 렌더
  renderDeckGrid();
});

// =====================================================
// 운세 타입 선택
// =====================================================
function selectType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;

  // 크레딧 체크
  if (getCredits() < 10) {
    showTarotCreditBlock();
    return;
  }

  // 크레딧 차감
  setCredits(getCredits() - 10);
  refreshAllCreditBadges();
  document.getElementById('tarotCreditDisplay').textContent = getCredits();

  // 카드 배치
  dealCards();
}

// =====================================================
// 카드 배치
// =====================================================
function dealCards() {
  // 초기화
  drawnCard = null;
  document.getElementById('resultPanel').classList.remove('show');

  // 22장 셔플
  const indices = [...Array(22).keys()];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  spreadShuffled = indices;

  // 카드 테이블 표시
  const spread = document.getElementById('cardSpread');
  spread.innerHTML = '';
  indices.forEach((cardIdx, pos) => {
    const tc = document.createElement('div');
    tc.className = 'tc';
    tc.dataset.pos = pos;
    tc.dataset.idx = cardIdx;
    tc.innerHTML = `
      <div class="tc-inner">
        <div class="tc-back">
          <div class="tc-back-inner"></div>
          <span class="tc-back-moon">🌙</span>
        </div>
        <div class="tc-front" id="tcf-${pos}"></div>
      </div>`;
    tc.addEventListener('click', () => onCardClick(tc, cardIdx));
    spread.appendChild(tc);
  });

  document.getElementById('cardTable').style.display = 'block';
  document.getElementById('instruction').style.display = 'block';
  document.getElementById('cardTable').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// =====================================================
// 카드 클릭
// =====================================================
function onCardClick(el, cardIdx) {
  if (drawnCard !== null) return;
  if (el.classList.contains('revealed')) return;

  drawnCard  = MAJOR_ARCANA[cardIdx];
  isReversed = Math.random() < 0.35; // 35% 역방향

  // 앞면 내용 채우기
  const front = el.querySelector('.tc-front');
  front.style.background = drawnCard.bg;
  if (isReversed) front.classList.add('rev');
  front.innerHTML = `
    <span class="tc-front-num">${drawnCard.num}</span>
    <span class="tc-front-emoji">${drawnCard.emoji}</span>
    <span class="tc-front-name">${drawnCard.name}</span>
    ${isReversed ? '<span class="tc-front-rev">역방향</span>' : ''}`;

  // 뒤집기 + 선택 효과
  el.classList.add('revealed','selected');

  // 나머지 카드 흐리게
  document.querySelectorAll('.tc').forEach(t => {
    if (t !== el) t.classList.add('dimmed');
  });

  document.getElementById('instruction').style.display = 'none';

  // 결과 표시 (약간 딜레이)
  setTimeout(showResult, 700);
}

// =====================================================
// 결과 표시
// =====================================================
function showResult() {
  const card  = drawnCard;
  const rev   = isReversed;
  const tl    = TYPE_LABELS[currentType] || TYPE_LABELS.today;
  const reading = card.readings[currentType] || card.readings.today;
  const kws     = rev ? card.reversedKw : card.uprightKw;

  const content = document.getElementById('resultContent');
  content.innerHTML = `
    <div class="result-card-row">
      <div class="result-card-img" style="background:${card.bg}">
        <span class="rci-num">${card.num}</span>
        <span class="rci-emoji">${card.emoji}</span>
        <span class="rci-name">${card.name}\n${card.en}</span>
        ${rev ? '<span class="rci-rev">역방향</span>' : ''}
      </div>
      <div class="result-card-info">
        <h2>${card.emoji} ${card.name}</h2>
        <div class="rci-sub">${card.en} ${rev ? '· 역방향 (Reversed)' : '· 정방향 (Upright)'}</div>
        <div class="result-keywords">
          ${kws.map(k => `<span>${k}</span>`).join('')}
        </div>
        <div style="font-size:0.85rem;color:rgba(255,255,255,0.65);line-height:1.7;">${card.desc}</div>
      </div>
    </div>

    <div class="reading-section">
      <div class="reading-type-label">${tl.icon} ${tl.label} 해석</div>
      <div class="reading-text">
        ${formatReading(reading, rev)}
      </div>
      <div class="reading-sections-grid" style="margin-top:20px;">
        <div class="rs-box">
          <h4>💡 핵심 메시지</h4>
          <p>${rev ? card.reversed : card.upright}</p>
        </div>
        <div class="rs-box">
          <h4>🌟 키워드</h4>
          <p>${kws.join(' · ')}</p>
        </div>
      </div>
    </div>`;

  // AdSense 초기화
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
  try {
    (adsbygoogle = window.adsbygoogle || []).push({});
  } catch(e) {}
}

function formatReading(text, rev) {
  // 중요 문장 하이라이트
  return text
    .replace(/\b(지금|오늘|이번 달|최고|가장)\b/g, '<span class="hl">$1</span>')
    .replace(/\b(성공|기회|행복|사랑|행운)\b/g, '<span class="hl2">$1</span>');
}

// =====================================================
// 다시 뽑기
// =====================================================
function resetDraw() {
  if (getCredits() < 10) {
    showTarotCreditBlock();
    return;
  }
  setCredits(getCredits() - 10);
  refreshAllCreditBadges();
  document.getElementById('tarotCreditDisplay').textContent = getCredits();

  document.getElementById('resultPanel').classList.remove('show');
  dealCards();
}

// =====================================================
// 공유
// =====================================================
function copyAndShare() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showCreditToast('링크 복사 완료! 친구에게 공유해보세요 😊');
  });
}
function shareAndReward() {
  const card = drawnCard ? drawnCard.name : '타로 카드';
  doShare(`마음연구소 타로 카드에서 "${card}" 카드를 뽑았어요! 당신도 한번 뽑아보세요 🃏`);
}

// =====================================================
// 크레딧 부족 모달
// =====================================================
function showTarotCreditBlock() {
  document.getElementById('creditModalOverlay').classList.add('open');
  document.getElementById('creditModalBody').innerHTML = `
    <div class="cm-header"><div class="cm-coin">😢</div><h3>크레딧이 부족해요</h3></div>
    <div class="cm-count cm-low">${getCredits()}<span>개</span></div>
    <div class="cm-desc">타로 카드 1회 뽑기는 <strong>10 크레딧</strong>이 필요해요.<br>공유하면 +10 크레딧을 받을 수 있어요!</div>
    <div class="cm-earn-list">
      <div class="cm-earn-item">
        <span class="cm-earn-icon">🔗</span>
        <div>
          <div class="cm-earn-title">링크 공유하기</div>
          <div class="cm-earn-sub">공유하면 <strong>+10 크레딧</strong> 즉시 지급!</div>
        </div>
        <button class="cm-earn-btn" onclick="doShare('마음연구소 타로 카드! 직접 카드를 뽑아보세요 🃏');closeCreditModal();document.getElementById('tarotCreditDisplay').textContent=getCredits();">공유 +10</button>
      </div>
    </div>
    <button class="cm-close-btn" onclick="closeCreditModal()">닫기</button>`;
}

// =====================================================
// 카드 사전
// =====================================================
function renderDeckGrid() {
  const grid = document.getElementById('deckGrid');
  grid.innerHTML = MAJOR_ARCANA.map(c => `
    <div class="deck-card" onclick="openCardDetail('${c.key}')">
      <span class="dc-emoji">${c.emoji}</span>
      <span class="dc-num">${c.num}</span>
      <span class="dc-name">${c.name}</span>
    </div>`).join('');
}

function openCardDetail(key) {
  const card = MAJOR_ARCANA.find(c => c.key === key);
  if (!card) return;
  document.getElementById('cardDetailModal').innerHTML = `
    <div class="cdm-header">
      <div class="cdm-img" style="background:${card.bg}">
        <span class="ci-emoji">${card.emoji}</span>
        <span class="ci-name">${card.name}</span>
      </div>
      <div class="cdm-info">
        <h3>${card.num}. ${card.name}</h3>
        <div class="ci-sub">${card.en}</div>
      </div>
    </div>
    <div class="cdm-section">
      <h4>핵심 키워드</h4>
      <div class="cdm-kws">${card.keywords.map(k=>`<span>${k}</span>`).join('')}</div>
    </div>
    <div class="cdm-section">
      <h4>카드 의미</h4>
      <p>${card.desc}</p>
    </div>
    <div class="cdm-section">
      <h4>⬆️ 정방향</h4>
      <p>${card.upright}</p>
    </div>
    <div class="cdm-section">
      <h4>⬇️ 역방향</h4>
      <p>${card.reversed}</p>
    </div>
    <button class="cdm-close" onclick="closeCardDetail()">닫기</button>`;
  document.getElementById('cardDetailOverlay').classList.add('open');
}

function closeCardDetail() {
  document.getElementById('cardDetailOverlay').classList.remove('open');
}
</script>
</body>
